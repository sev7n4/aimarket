# 生产镜像覆盖 — 服务器从腾讯云 TCR 拉取（与 GHA 双推 TCR 一致）
# 用法:
#   export TCR_REGISTRY=ccr.ccs.tencentyun.com
#   export TCR_NAMESPACE=aimarket
#   export IMAGE_TAG=<git-sha>
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml pull
#   docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml up -d --no-build
name: aimarket

services:
  api:
    image: ${TCR_REGISTRY:?set TCR_REGISTRY}/${TCR_NAMESPACE:?set TCR_NAMESPACE}/aimarket-api:${IMAGE_TAG:?set IMAGE_TAG}

  web:
    image: ${TCR_REGISTRY:?set TCR_REGISTRY}/${TCR_NAMESPACE:?set TCR_NAMESPACE}/aimarket-web:${IMAGE_TAG:?set IMAGE_TAG}
