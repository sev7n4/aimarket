# 生产 compose — 独立网络，不接入 pintuotuo 栈
# GHA / 服务器推荐（无本地构建）:
#   IMAGE_TAG=<sha> docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml pull
#   IMAGE_TAG=<sha> docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml up -d --no-build
# 本地调试构建:
#   cp deploy/.env.production.example .env
#   docker compose -f deploy/docker-compose.prod.yml up -d --build

name: aimarket

services:
  api:
    image: ${AIMARKET_API_IMAGE:-aimarket-api:local}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: aimarket-api
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    # 业务密钥与 Provider 仅从 env_file（../.env）注入，避免 environment 段
    # 用宿主机 shell 默认值覆盖 .env（见 docs/PRODUCTION_SECRETS.md）
    environment:
      PORT: "4000"
      DATABASE_PATH: /app/data/aimarket.db
      UPLOAD_DIR: /app/uploads
    ports:
      - "4100:4000"
    volumes:
      - aimarket-data:/app/data
      - aimarket-uploads:/app/uploads
    networks:
      - aimarket
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  web:
    image: ${AIMARKET_WEB_IMAGE:-aimarket-web:local}
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://119.29.173.89:4100}
    container_name: aimarket-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3100:3000"
    networks:
      - aimarket

networks:
  aimarket:
    name: aimarket-net

volumes:
  aimarket-data:
  aimarket-uploads:
