id: drama-mv-v1
version: 1
name: MV / 创意片
description: 60s 内单线叙事 + BGM 轨，复用短剧制作流水线（PROD-B05）
confirmIfPointsOver: 200
steps:
  - id: bgm
    type: music_gen
    label: BGM 音乐生成
    options:
      defaultBpm: 120
      defaultDurationSec: 60
  - id: char_refs
    type: character_refs
    label: 角色定稿板（三视图 Anchor First）
  - id: scene_refs
    type: scene_refs
    label: 场景定稿
  - id: keyframes
    type: keyframe_batch
    label: 分镜关键帧
    sourceSteps:
      - char_refs
      - scene_refs
    audit:
      characterMinScore: 75
      styleMinScore: 70
      maxRetries: 2
  - id: shot_videos
    type: shot_video_batch
    label: 逐镜视频（关键帧锁定 i2v）
    sourceStep: keyframes
  - id: tts
    type: tts_batch
    label: 对白配音
  - id: lipsync
    type: lipsync_batch
    label: 口型同步
    sourceSteps:
      - shot_videos
      - tts
  - id: narrator_tts
    type: tts_batch
    label: 旁白配音
  - id: final_edit
    type: concat
    label: 剪辑合成（含 BGM）
    sourceSteps:
      - lipsync
      - bgm
    options:
      subtitles: true
