# 运维：归档灵感画廊中无法播放的视频（metadata_user 坏链等）
name: Cleanup broken inspiration videos (prod)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    name: Archive broken video inspirations
    runs-on: [self-hosted, aimarket-build]
    timeout-minutes: 5
    environment: production
    steps:
      - name: Archive broken inspirations via local admin API
        run: |
          set -euo pipefail
          sudo docker exec -i aimarket-api node <<'NODE'
          const API = "http://127.0.0.1:4000";
          const ADMIN = process.env.ADMIN_SECRET;
          if (!ADMIN) {
            console.error("ADMIN_SECRET missing in api container");
            process.exit(1);
          }
          function suspect(url) {
            if (!url || typeof url !== "string") return false;
            return /metadata_user|metadata_/i.test(url);
          }
          function isBrokenVideo(row) {
            if (row.status !== "published") return false;
            const cover = row.coverUrl ?? "";
            const video = row.videoUrl ?? "";
            const refs = Array.isArray(row.referenceAssets) ? row.referenceAssets : [];
            const isVideo =
              row.mediaType === "video" ||
              /\.mp4/i.test(cover) ||
              refs.some((a) => /\.mp4/i.test(a?.url ?? ""));
            if (!isVideo) return false;
            if (!cover || !video) return true;
            return suspect(cover) || suspect(video) || refs.some((a) => suspect(a?.url));
          }
          async function api(path, opts = {}) {
            const res = await fetch(`${API}${path}`, {
              ...opts,
              headers: {
                "Content-Type": "application/json",
                "x-admin-secret": ADMIN,
                ...(opts.headers ?? {}),
              },
            });
            const json = await res.json().catch(() => ({}));
            return { res, json };
          }
          async function main() {
            const list = await api("/api/v1/admin/inspiration");
            if (!list.res.ok) {
              console.error("admin list failed", list.res.status, list.json?.error?.message ?? list.json);
              process.exit(1);
            }
            const rows = list.json?.data ?? [];
            const broken = rows.filter(isBrokenVideo);
            if (!broken.length) {
              console.log("No broken video inspirations to archive.");
              return;
            }
            console.log(`Found ${broken.length} broken video inspiration(s):`);
            for (const row of broken) {
              console.log(`  - ${row.id}  ${row.title}`);
              const del = await api(`/api/v1/admin/inspiration/${row.id}`, { method: "DELETE" });
              if (!del.res.ok) {
                console.error(`    failed ${del.res.status}`, del.json?.error?.message);
                process.exit(1);
              }
              console.log("    archived");
            }
          }
          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE
