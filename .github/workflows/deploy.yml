name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          tags: aimarket-api:release
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          build-args: |
            NEXT_PUBLIC_API_URL=http://119.29.173.89:4100
          tags: aimarket-web:release
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save images
        run: |
          docker save aimarket-api:release aimarket-web:release | gzip > aimarket-images.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: aimarket-docker-images
          path: aimarket-images.tar.gz
          retention-days: 3

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: aimarket-docker-images
      - name: Copy images to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: aimarket-images.tar.gz
          target: /tmp/
      - name: Load images and start stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            AIMARKET_DIR="/opt/aimarket"
            if [[ ! -d "$AIMARKET_DIR/.git" ]]; then
              git clone --depth 1 https://github.com/sev7n4/aimarket.git "$AIMARKET_DIR"
            fi
            cd "$AIMARKET_DIR"
            git fetch origin && git reset --hard origin/main
            if [[ ! -f .env ]]; then
              cp deploy/.env.production.example .env
              sed -i "s/请替换为随机长字符串/$(openssl rand -hex 24)/" .env
              sed -i "s/请替换为随机管理密钥/$(openssl rand -hex 16)/" .env
            fi
            gunzip -c /tmp/aimarket-images.tar.gz | docker load
            export AIMARKET_API_IMAGE=aimarket-api:release
            export AIMARKET_WEB_IMAGE=aimarket-web:release
            docker compose -f deploy/docker-compose.prod.yml up -d --no-build
            sleep 12
            curl -fsS http://127.0.0.1:4100/health
            curl -fsS -o /dev/null -w "web %{http_code}\n" http://127.0.0.1:3100/
