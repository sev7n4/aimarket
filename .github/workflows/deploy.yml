# GHA 在腾讯云自建 runner 构建并仅推 TCR；生产 CVM 只从 TCR pull。
# GHCR 备份见 workflow_dispatch：Mirror TCR images to GHCR。
# 合并节奏见 docs/DEPLOY_MERGE_POLICY.md（保留 cancel-in-progress，避免连续 merge 浪费 push）。
name: Deploy to Tencent Cloud (AIMarket)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
      use_github_hosted:
        description: Emergency fallback — build on ubuntu-latest (slow TCR push)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: aimarket-deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE || 'aimarket' }}

jobs:
  build-push:
    name: Build ${{ matrix.image }}
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.use_github_hosted == true) && 'ubuntu-latest' || fromJSON('["self-hosted", "aimarket-build"]') }}
    environment: production
    env:
      PUBLIC_API_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:4100
    strategy:
      fail-fast: false
      # 单台自建 runner 时串行构建，避免 web/api 同时占满 CPU
      max-parallel: 1
      matrix:
        include:
          - image: aimarket-api
            file: deploy/docker/Dockerfile.api
          - image: aimarket-web
            file: deploy/docker/Dockerfile.web
            web_image: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Validate TCR credentials
        run: |
          if [[ -z "${{ secrets.TCR_USERNAME }}" || -z "${{ secrets.TCR_PASSWORD }}" ]]; then
            echo "::error::Missing TCR_USERNAME or TCR_PASSWORD in environment production."
            exit 1
          fi
          echo "TCR registry: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}"
          echo "Build runner: ${{ runner.name }} (${{ runner.os }})"
          echo "Build started (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - uses: docker/setup-buildx-action@v3

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Validate NEXT_PUBLIC_API_URL for web image
        if: matrix.web_image
        run: |
          url="${{ env.PUBLIC_API_URL }}"
          if [[ -z "$url" || "$url" == *"://:"* || "$url" == *"://:4100"* ]]; then
            echo "::error::Invalid PUBLIC_API_URL='$url'. Set TENCENT_CLOUD_IP in environment production."
            exit 1
          fi
          echo "Web build API URL: $url"

      - name: Build and push (TCR only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          build-args: ${{ matrix.web_image && format('NEXT_PUBLIC_API_URL={0}', env.PUBLIC_API_URL) || '' }}
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=aimarket-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=aimarket-${{ matrix.image }}

      - name: Build timing
        if: always()
        run: echo "Build finished (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${{ matrix.image }}"

  deploy:
    name: Deploy AIMarket
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_HOST: ${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}
      SSH_USER: ${{ secrets.TENCENT_CLOUD_USER || secrets.DEPLOY_USER }}
      SSH_KEY: ${{ secrets.TENCENT_CLOUD_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
      PUBLIC_API_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:4100
      PUBLIC_WEB_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:3100

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Copy deploy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          timeout: 120s
          source: deploy/docker-compose.prod.yml,deploy/docker-compose.prod.images.yml,deploy/.env.production.example
          target: /tmp/aimarket-deploy/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          timeout: 120s
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            AIMARKET_DIR="/opt/aimarket"
            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            TCR_REGISTRY="${{ env.TCR_REGISTRY }}"
            TCR_NAMESPACE="${{ env.TCR_NAMESPACE }}"
            IMAGE_REPO_PREFIX="${TCR_REGISTRY}/${TCR_NAMESPACE}"
            export COMPOSE_HTTP_TIMEOUT=300
            export DOCKER_CLIENT_TIMEOUT=300
            mkdir -p "$AIMARKET_DIR/deploy"
            cp /tmp/aimarket-deploy/deploy/docker-compose.prod.yml "$AIMARKET_DIR/deploy/"
            cp /tmp/aimarket-deploy/deploy/docker-compose.prod.images.yml "$AIMARKET_DIR/deploy/"
            cp /tmp/aimarket-deploy/deploy/.env.production.example "$AIMARKET_DIR/deploy/" 2>/dev/null || true
            cd "$AIMARKET_DIR"
            if [[ ! -f .env ]]; then
              cp deploy/.env.production.example .env
              sed -i "s/请替换为随机长字符串/$(openssl rand -hex 24)/" .env
              sed -i "s/请替换为随机管理密钥/$(openssl rand -hex 16)/" .env
            fi
            echo "${{ secrets.TCR_PASSWORD }}" | docker login "$TCR_REGISTRY" -u "${{ secrets.TCR_USERNAME }}" --password-stdin
            COMPOSE="docker compose -f deploy/docker-compose.prod.yml -f deploy/docker-compose.prod.images.yml"
            echo "=== Disk before deploy ==="
            df -h / /var/lib/docker 2>/dev/null || df -h /
            docker system df 2>/dev/null || true
            echo "Pre-pull cleanup (free space before pull)..."
            set +euo
            docker image prune -f >/dev/null 2>&1
            for REPO in "${IMAGE_REPO_PREFIX}/aimarket-api" "${IMAGE_REPO_PREFIX}/aimarket-web"; do
              docker images "$REPO" --format '{{.Tag}}' 2>/dev/null | while read -r tag; do
                [[ -z "$tag" || "$tag" == "<none>" ]] && continue
                [[ "$tag" == "$IMAGE_TAG" || "$tag" == "latest" ]] && continue
                docker rmi "${REPO}:${tag}" 2>/dev/null || true
              done || true
            done
            for LEGACY in aimarket-api:release aimarket-web:release aimarket-api:local aimarket-web:local; do
              docker rmi "$LEGACY" 2>/dev/null || true
            done
            docker builder prune -af --filter "until=48h" 2>/dev/null || true
            AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [[ "${AVAIL_KB:-0}" -lt 2097152 ]]; then
              echo "WARN: disk < 2GB free, pruning all unused images"
              docker image prune -af >/dev/null 2>&1
            fi
            AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [[ "${AVAIL_KB:-0}" -lt 1048576 ]]; then
              echo "ERROR: disk < 1GB free after prune — run: sudo bash $AIMARKET_DIR/deploy/cleanup-disk.sh"
              exit 1
            fi
            set -euo pipefail
            echo "=== Pull images from TCR (${IMAGE_REPO_PREFIX}) ==="
            PULL_START=$(date +%s)
            for i in 1 2 3; do
              if TCR_REGISTRY="$TCR_REGISTRY" TCR_NAMESPACE="$TCR_NAMESPACE" IMAGE_TAG="$IMAGE_TAG" $COMPOSE pull; then
                break
              fi
              if [[ "$i" -eq 3 ]]; then
                echo "ERROR: docker compose pull failed after $i attempts"
                exit 1
              fi
              sleep $((i * 15))
            done
            echo "Pull elapsed: $(($(date +%s) - PULL_START))s"
            TCR_REGISTRY="$TCR_REGISTRY" TCR_NAMESPACE="$TCR_NAMESPACE" IMAGE_TAG="$IMAGE_TAG" $COMPOSE up -d --no-build
            echo "Pruning dangling images..."
            set +euo
            docker image prune -f >/dev/null 2>&1
            echo "Removing stale AIMarket image tags on server..."
            for REPO in "${IMAGE_REPO_PREFIX}/aimarket-api" "${IMAGE_REPO_PREFIX}/aimarket-web"; do
              docker images "$REPO" --format '{{.Tag}}' 2>/dev/null | while read -r tag; do
                [[ -z "$tag" || "$tag" == "<none>" ]] && continue
                [[ "$tag" == "$IMAGE_TAG" || "$tag" == "latest" ]] && continue
                docker rmi "${REPO}:${tag}" 2>/dev/null || true
              done || true
            done
            echo "Removing legacy local release tags (pre-TCR deploy)..."
            for LEGACY in aimarket-api:release aimarket-web:release aimarket-api:local aimarket-web:local; do
              docker rmi "$LEGACY" 2>/dev/null || true
            done
            docker builder prune -f --filter "until=72h" 2>/dev/null || true
            set -euo pipefail
            echo "Deployment completed (IMAGE_TAG=$IMAGE_TAG, registry=$IMAGE_REPO_PREFIX)"

      - name: Verify deployment
        run: |
          set -e
          API_BASE="${{ env.PUBLIC_API_URL }}"
          WEB_BASE="${{ env.PUBLIC_WEB_URL }}"
          echo "=== 1) API health ==="
          OK=0
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "${API_BASE}/health" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health OK"
              OK=1
              break
            fi
            echo "Attempt $i: HTTP $CODE"
            sleep $((i <= 5 ? 5 : 10))
          done
          [ "$OK" = "1" ] || exit 1
          echo "=== 2) Web ==="
          W=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 15 "${WEB_BASE}/" 2>/dev/null || echo "000")
          [ "$W" = "200" ] || exit 1
          echo "Web OK (HTTP $W)"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## AIMarket Deployment"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | ${{ job.status }} |"
            echo "| Branch | ${{ env.DEPLOY_BRANCH }} |"
            echo "| Image tag | \`${{ env.IMAGE_TAG }}\` |"
            echo "| Registry | \`${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}\` |"
            echo "| Build | self-hosted \`aimarket-build\` (see [runner setup](../docs/DEPLOY_CI.md)) |"
            echo "| GHCR backup | manual workflow \`ghcr-backup.yml\` |"
            echo "| Server | ${{ env.SSH_HOST }} |"
            echo "| Web | ${{ env.PUBLIC_WEB_URL }} |"
            echo "| API | ${{ env.PUBLIC_API_URL }} |"
            echo ""
            echo "合并节奏：见 [DEPLOY_MERGE_POLICY.md](../docs/DEPLOY_MERGE_POLICY.md)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check deployment notification email
        if: always()
        id: deployment_email
        run: |
          if [ -n "${DEPLOYMENT_NOTIFICATION_EMAIL}" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEPLOYMENT_NOTIFICATION_EMAIL: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}

      - name: Send email notification
        if: always() && steps.deployment_email.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[AIMarket Deploy] ${{ job.status }} — ${{ env.DEPLOY_BRANCH }}"
          body: |
            Status: ${{ job.status }}
            Branch: ${{ env.DEPLOY_BRANCH }}
            Image: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/aimarket-*:${{ env.IMAGE_TAG }}
            Server: ${{ env.SSH_HOST }}
            Web: ${{ env.PUBLIC_WEB_URL }}
            API: ${{ env.PUBLIC_API_URL }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
