# 同地域 self-hosted runner（aimarket-build）构建并推 TCR；生产 CVM 只从 TCR pull。
# 一次性安装：deploy/bootstrap-github-runner.sh（见 docs/DEPLOY_CI.md）。
# GHCR 备份见 workflow_dispatch：Mirror TCR images to GHCR。
# 合并节奏见 docs/DEPLOY_MERGE_POLICY.md（保留 cancel-in-progress，避免连续 merge 浪费 push）。
name: Deploy to Tencent Cloud (AIMarket)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: aimarket-deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE || 'aimarket' }}

jobs:
  preflight:
    name: Check build runner
    runs-on: [self-hosted, aimarket-build]
    timeout-minutes: 5
    steps:
      - name: Verify runner and Docker
        run: |
          set -euo pipefail
          echo "Runner: ${{ runner.name }} (${{ runner.os }})"
          docker version
          docker buildx version
          df -h / /var/lib/docker 2>/dev/null || df -h /
          AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
          if [[ "${AVAIL_KB:-0}" -lt 4194304 ]]; then
            echo "::error::Build runner disk < 4GB free. SSH to build host and run: sudo bash /opt/aimarket/deploy/prune-build-runner.sh && sudo bash /opt/aimarket/deploy/restart-github-runner.sh"
            exit 1
          fi

  build-push:
    name: Build ${{ matrix.image }}
    needs: preflight
    runs-on: [self-hosted, aimarket-build]
    timeout-minutes: ${{ matrix.timeout_minutes }}
    environment: production
    env:
      PUBLIC_API_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:4100
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - image: aimarket-api
            file: deploy/docker/Dockerfile.api
            timeout_minutes: 90
          - image: aimarket-web
            file: deploy/docker/Dockerfile.web
            web_image: true
            timeout_minutes: 60
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          REF="${{ github.event.inputs.branch || github.sha }}"
          ORIGIN_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          rm -rf .git
          git init -q
          git config http.lowSpeedLimit 100
          git config http.lowSpeedTime 300
          git config http.postBuffer 524288000
          fetch_ok=0
          for attempt in $(seq 1 10); do
            git remote remove origin 2>/dev/null || true
            git remote add origin "$ORIGIN_URL"
            if git fetch --depth 1 origin "$REF"; then
              fetch_ok=1
              break
            fi
            echo "git fetch attempt ${attempt}/10 failed, retry in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          [[ "$fetch_ok" = "1" ]] || { echo "::error::git fetch failed after 10 attempts"; exit 1; }
          git checkout FETCH_HEAD

      - name: Validate TCR credentials
        run: |
          if [[ -z "${{ secrets.TCR_USERNAME }}" || -z "${{ secrets.TCR_PASSWORD }}" ]]; then
            echo "::error::Missing TCR_USERNAME or TCR_PASSWORD in environment production."
            exit 1
          fi
          echo "TCR registry: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}"
          echo "Build runner: ${{ runner.name }} (${{ runner.os }})"
          echo "Build started (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Setup buildx and login to TCR
        run: |
          set -euo pipefail
          docker buildx use default
          echo "${{ secrets.TCR_PASSWORD }}" | docker login "${{ env.TCR_REGISTRY }}" \
            -u "${{ secrets.TCR_USERNAME }}" --password-stdin

      - name: Validate NEXT_PUBLIC_API_URL for web image
        if: matrix.web_image
        run: |
          url="${{ env.PUBLIC_API_URL }}"
          if [[ -z "$url" || "$url" == *"://:"* || "$url" == *"://:4100"* ]]; then
            echo "::error::Invalid PUBLIC_API_URL='$url'. Set TENCENT_CLOUD_IP in environment production."
            exit 1
          fi
          echo "Web build API URL: $url"

      - name: Prune Docker before build
        run: |
          set +e
          docker builder prune -f --filter "until=48h" >/dev/null 2>&1
          docker image prune -f >/dev/null 2>&1
          if [[ -x /opt/aimarket/deploy/prune-build-runner.sh ]]; then
            bash /opt/aimarket/deploy/prune-build-runner.sh || true
          elif [[ -x deploy/prune-build-runner.sh ]]; then
            bash deploy/prune-build-runner.sh || true
          fi
          AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
          USE_PCT=$(df -Pk / | awk 'NR==2 {gsub(/%/,"",$5); print $5}')
          if [[ "${AVAIL_KB:-0}" -lt 8388608 || "${USE_PCT:-0}" -gt 75 ]]; then
            echo "Disk tight (avail=$((AVAIL_KB / 1024 / 1024))GB use=${USE_PCT}%) — builder prune -af"
            docker builder prune -af --filter "until=24h" >/dev/null 2>&1 || true
            docker image prune -af >/dev/null 2>&1 || true
          fi
          set -e
          df -h / /var/lib/docker 2>/dev/null || df -h /
          docker system df 2>/dev/null || true

      - name: Build and push (TCR only)
        run: |
          set -euo pipefail
          IMAGE="${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}"
          ARGS=()
          if [[ "${{ matrix.web_image }}" == "true" ]]; then
            ARGS+=(--build-arg "NEXT_PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}")
            ARGS+=(--shm-size=512m)
          fi
          push_ok=0
          for attempt in $(seq 1 3); do
            if docker buildx build \
              --file "${{ matrix.file }}" \
              --push \
              "${ARGS[@]}" \
              --tag "${IMAGE}:${{ env.IMAGE_TAG }}" \
              --tag "${IMAGE}:latest" \
              --cache-from "type=registry,ref=${IMAGE}:buildcache" \
              .; then
              push_ok=1
              break
            fi
            echo "build push attempt ${attempt}/3 failed, retry in $((attempt * 30))s..."
            sleep $((attempt * 30))
          done
          [[ "$push_ok" = "1" ]] || { echo "::error::docker build push failed after 3 attempts"; exit 1; }

      - name: Build timing
        if: always()
        run: |
          echo "Build finished (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${{ matrix.image }}"

  deploy:
    name: Deploy AIMarket
    needs: build-push
    runs-on: [self-hosted, aimarket-build]
    timeout-minutes: 15
    environment: production
    env:
      SSH_HOST: ${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}
      SSH_USER: ${{ secrets.TENCENT_CLOUD_USER || secrets.DEPLOY_USER }}
      SSH_KEY: ${{ secrets.TENCENT_CLOUD_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
      PUBLIC_API_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:4100
      PUBLIC_WEB_URL: http://${{ secrets.TENCENT_CLOUD_IP || secrets.DEPLOY_HOST }}:3100

    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          REF="${{ github.event.inputs.branch || github.sha }}"
          ORIGIN_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          rm -rf .git
          git init -q
          git config http.lowSpeedLimit 100
          git config http.lowSpeedTime 300
          git config http.postBuffer 524288000
          fetch_ok=0
          for attempt in $(seq 1 10); do
            git remote remove origin 2>/dev/null || true
            git remote add origin "$ORIGIN_URL"
            if git fetch --depth 1 origin "$REF"; then
              fetch_ok=1
              break
            fi
            echo "git fetch attempt ${attempt}/10 failed, retry in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done
          [[ "$fetch_ok" = "1" ]] || { echo "::error::git fetch failed after 10 attempts"; exit 1; }
          git checkout FETCH_HEAD

      - name: Deploy locally on runner host
        run: |
          set -euo pipefail
          AIMARKET_DIR="/opt/aimarket"
          sudo /bin/cp deploy/docker-compose.prod.yml "$AIMARKET_DIR/deploy/"
          sudo /bin/cp deploy/docker-compose.prod.images.yml "$AIMARKET_DIR/deploy/"
          sudo /bin/cp deploy/.env.production.example "$AIMARKET_DIR/deploy/" 2>/dev/null || true
          if [[ ! -f "$AIMARKET_DIR/.env" ]]; then
            sudo /bin/cp "$AIMARKET_DIR/deploy/.env.production.example" "$AIMARKET_DIR/.env"
            sudo sed -i "s/请替换为随机长字符串/$(openssl rand -hex 24)/" "$AIMARKET_DIR/.env"
            sudo sed -i "s/请替换为随机管理密钥/$(openssl rand -hex 16)/" "$AIMARKET_DIR/.env"
          fi
          echo "${{ secrets.TCR_PASSWORD }}" | sudo /usr/bin/docker login "${{ env.TCR_REGISTRY }}" \
            -u "${{ secrets.TCR_USERNAME }}" --password-stdin
          export IMAGE_TAG="${{ env.IMAGE_TAG }}"
          export TCR_REGISTRY="${{ env.TCR_REGISTRY }}"
          export TCR_NAMESPACE="${{ env.TCR_NAMESPACE }}"
          sudo -E "$AIMARKET_DIR/deploy/deploy-remote.sh"

      - name: Verify deployment
        run: |
          set -e
          API_BASE="${{ env.PUBLIC_API_URL }}"
          WEB_BASE="${{ env.PUBLIC_WEB_URL }}"
          echo "=== 1) API health ==="
          OK=0
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "${API_BASE}/health" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health OK"
              OK=1
              break
            fi
            echo "Attempt $i: HTTP $CODE"
            sleep $((i <= 5 ? 5 : 10))
          done
          [ "$OK" = "1" ] || exit 1
          echo "=== 2) Web ==="
          W=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 15 "${WEB_BASE}/" 2>/dev/null || echo "000")
          [ "$W" = "200" ] || exit 1
          echo "Web OK (HTTP $W)"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## AIMarket Deployment"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | ${{ job.status }} |"
            echo "| Branch | ${{ env.DEPLOY_BRANCH }} |"
            echo "| Image tag | \`${{ env.IMAGE_TAG }}\` |"
            echo "| Registry | \`${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}\` |"
            echo "| Build | \`self-hosted / aimarket-build\` (同地域 TCR push) |"
            echo "| GHCR backup | manual workflow \`ghcr-backup.yml\` |"
            echo "| Server | ${{ env.SSH_HOST }} |"
            echo "| Web | ${{ env.PUBLIC_WEB_URL }} |"
            echo "| API | ${{ env.PUBLIC_API_URL }} |"
            echo ""
            echo "合并节奏：见 [DEPLOY_MERGE_POLICY.md](../docs/DEPLOY_MERGE_POLICY.md)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check deployment notification email
        if: always()
        id: deployment_email
        run: |
          if [ -n "${DEPLOYMENT_NOTIFICATION_EMAIL}" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEPLOYMENT_NOTIFICATION_EMAIL: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}

      - name: Send email notification
        if: always() && steps.deployment_email.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[AIMarket Deploy] ${{ job.status }} — ${{ env.DEPLOY_BRANCH }}"
          body: |
            Status: ${{ job.status }}
            Branch: ${{ env.DEPLOY_BRANCH }}
            Image: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/aimarket-*:${{ env.IMAGE_TAG }}
            Server: ${{ env.SSH_HOST }}
            Web: ${{ env.PUBLIC_WEB_URL }}
            API: ${{ env.PUBLIC_API_URL }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
