# 生产验证 workflow（只读）— 确认 C-S4 / C-S5 / C-S6 / C-S7 / C-S8 已部署生效
# 手动触发：gh workflow run verify-production.yml
name: Verify production (AIMarket)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify C-S4 / C-S5 / C-S6 / C-S7 / C-S8 in production
    runs-on: [self-hosted, aimarket-build]
    timeout-minutes: 8
    env:
      API_BASE: http://127.0.0.1:4100
      WEB_BASE: http://127.0.0.1:3100

    steps:
      - name: 1) API + Web health
        run: |
          set -e
          echo "=== API /health ==="
          curl -fsS --connect-timeout 5 --max-time 10 "$API_BASE/health" | head -c 300; echo
          echo "=== Web / ==="
          W=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 15 "$WEB_BASE/" || echo "000")
          echo "Web HTTP=$W"
          [ "$W" = "200" ] || { echo "::error::Web not 200"; exit 1; }

      - name: 2) C-S4 — autoQcRetry module present in api container
        run: |
          set -e
          echo "=== dist/lib/drama/qc-auto-retry.js ==="
          docker exec aimarket-api ls -la /app/dist/lib/drama/qc-auto-retry.js
          echo "=== export check ==="
          docker exec aimarket-api node -e \
            "const m=require('/app/dist/lib/drama/qc-auto-retry.js'); console.log('applyAutoQcRetry:', typeof m.applyAutoQcRetry)"

      - name: 3) C-S4 — qc-director wires auto retry
        run: |
          set -e
          echo "=== qc-director calls applyAutoQcRetry ==="
          docker exec aimarket-api sh -c "grep -n 'applyAutoQcRetry' /app/dist/lib/drama/planner/qc-director.js | head -5"

      - name: 4) C-S5 — timeline route registered
        run: |
          set -e
          echo "=== /timeline in drama routes ==="
          docker exec aimarket-api sh -c "grep -nE '/timeline|timeline' /app/dist/routes/drama.js | head -10"

      - name: 5) C-S5 — timeline editor chunk in web
        run: |
          set -e
          echo "=== chunks containing timeline-editor ==="
          docker exec aimarket-web sh -c \
            "grep -rln 'DramaTimelineEditor\|drama-timeline-editor\|audio_bgm\|track_dialogue' /app/apps/web/.next 2>/dev/null | head -10"
          echo "=== static chunk count ==="
          docker exec aimarket-web sh -c "ls /app/apps/web/.next/static/chunks | wc -l"

      - name: 6) API endpoints reachable (auth-aware)
        run: |
          set +e
          echo "=== OPTIONS /api/v1/drama/projects ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS "$API_BASE/api/v1/drama/projects" || echo "000")
          echo "OPTIONS -> $CODE (expect 204/200)"
          echo "=== GET /api/v1/drama/projects (no auth) ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/v1/drama/projects" || echo "000")
          echo "GET -> $CODE (expect 401/403 if auth required, 200 if public)"
          echo "=== GET /api/v1/drama/healthz or /health fallback ==="
          curl -fsS "$API_BASE/health" | head -c 200; echo
          exit 0

      - name: 7) C-S6 — workspace-reviews lib present in api container
        run: |
          set -e
          echo "=== dist/lib/workspace-reviews.js ==="
          docker exec aimarket-api ls -la /app/dist/lib/workspace-reviews.js
          echo "=== export check ==="
          docker exec aimarket-api node -e \
            "const m=require('/app/dist/lib/workspace-reviews.js'); console.log('listWorkspaceReviews:', typeof m.listWorkspaceReviews); console.log('createWorkspaceReview:', typeof m.createWorkspaceReview); console.log('addReviewComment:', typeof m.addReviewComment); console.log('updateWorkspaceReviewStatus:', typeof m.updateWorkspaceReviewStatus);"

      - name: 8) C-S6 — reviews routes registered in workspaces router
        run: |
          set -e
          echo "=== /reviews in workspaces.js ==="
          docker exec aimarket-api sh -c "grep -nE 'reviews|reviewId|comments' /app/dist/routes/workspaces.js | head -15"

      - name: 9) C-S6 — workspace_reviews table exists in DB
        run: |
          set -e
          echo "=== sqlite schema (workspace_reviews) ==="
          docker exec aimarket-api sh -c "ls /app/data/*.db 2>/dev/null | head -3"
          DB=$(docker exec aimarket-api sh -c "ls /app/data/*.db 2>/dev/null | head -1")
          if [ -n "$DB" ]; then
            docker exec aimarket-api sqlite3 "$DB" ".schema workspace_reviews" 2>&1 | head -20
            docker exec aimarket-api sqlite3 "$DB" ".schema workspace_review_comments" 2>&1 | head -20
          else
            echo "::warning::no /app/data/*.db found, skipping schema dump"
          fi

      - name: 10) C-S6 — studio-review-sidebar chunk in web
        run: |
          set +e
          echo "=== chunks containing studio-review-sidebar ==="
          docker exec aimarket-web sh -c \
            "grep -rln 'studio-review-sidebar\|StudioReviewSidebar\|WorkspaceReview\|review-comment' /app/apps/web/.next 2>/dev/null | head -10"
          echo "=== ok (informational only) ==="

      - name: 11) C-S6 — GET /api/v1/workspaces/:id/reviews (auth-aware)
        run: |
          set +e
          echo "=== GET /api/v1/workspaces/test-id/reviews (no auth) ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/v1/workspaces/test-id/reviews" || echo "000")
          echo "GET -> $CODE (expect 401/403 if auth required)"
          exit 0

      - name: 12) C-S7 — project-versions lib present in api container
        run: |
          set -e
          echo "=== dist/lib/drama/project-versions.js ==="
          docker exec aimarket-api ls -la /app/dist/lib/drama/project-versions.js
          echo "=== export check ==="
          docker exec aimarket-api node -e \
            "const m=require('/app/dist/lib/drama/project-versions.js'); console.log('listDramaProjectVersions:', typeof m.listDramaProjectVersions); console.log('getDramaProjectVersion:', typeof m.getDramaProjectVersion); console.log('restoreDramaProjectVersion:', typeof m.restoreDramaProjectVersion); console.log('diffDramaProjectVersions:', typeof m.diffDramaProjectVersions);"

      - name: 13) C-S7 — version routes registered in drama router
        run: |
          set -e
          echo "=== /versions and /restore in drama.js ==="
          docker exec aimarket-api sh -c "grep -nE 'versions|restore' /app/dist/routes/drama.js | head -15"

      - name: 14) C-S7 — drama_project_versions table exists in DB
        run: |
          set -e
          echo "=== check via node:sqlite ==="
          docker exec aimarket-api node -e \
            "const {DatabaseSync}=require('node:sqlite'); const db=new DatabaseSync('/app/data/aimarket.db'); const row=db.prepare(\"SELECT name FROM sqlite_master WHERE type='table' AND name='drama_project_versions'\").get(); console.log('table:', row?.name || 'NOT FOUND'); if (row) { const cols=db.prepare('PRAGMA table_info(drama_project_versions)').all(); console.log('columns:', cols.map(c=>c.name).join(',')); }"

      - name: 15) C-S7 — GET /api/v1/drama/projects/:id/versions (auth-aware)
        run: |
          set +e
          echo "=== GET /api/v1/drama/projects/test-id/versions (no auth) ==="
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE/api/v1/drama/projects/test-id/versions" || echo "000")
          echo "GET -> $CODE (expect 401/403 if auth required)"
          exit 0

      - name: 16) C-S7 — version-history chunk in web
        run: |
          set +e
          echo "=== chunks containing drama-version-history ==="
          docker exec aimarket-web sh -c \
            "grep -rln 'drama-version-history\|DramaVersionHistory\|DramaProjectVersionSummary\|restoreDramaProjectVersion' /app/apps/web/.next 2>/dev/null | head -10"
          echo "=== ok (informational only) ==="

      - name: 17) C-S8 — checkout repo and verify SDK package
        run: |
          set -e
          echo "=== checkout latest main ==="
          rm -rf /tmp/aimarket-verify-cs8 2>/dev/null || true
          mkdir -p /tmp/aimarket-verify-cs8
          cd /tmp/aimarket-verify-cs8
          git init -q
          git remote add origin https://github.com/sev7n4/aimarket.git
          git fetch --depth=1 -q origin main
          git checkout -q FETCH_HEAD
          echo "=== packages/moyu-skills-sdk/package.json ==="
          head -25 packages/moyu-skills-sdk/package.json
          echo "=== scripts/test-moyu-sdk.mjs exists ==="
          ls -la scripts/test-moyu-sdk.mjs

      - name: 18) C-S8 — build SDK + run integration test via aimarket-api container
        run: |
          set -e
          set -o pipefail
          echo "=== copy checkout into api container ==="
          docker exec aimarket-api sh -c "mkdir -p /tmp/verify-cs8 && rm -rf /tmp/verify-cs8/*"
          docker cp /tmp/aimarket-verify-cs8/. aimarket-api:/tmp/verify-cs8/
          echo "=== install typescript + @types/node into isolated prefix (/tmp/cs8-deps) ==="
          docker exec aimarket-api sh -c "rm -rf /tmp/cs8-deps && npm install --prefix /tmp/cs8-deps --no-audit --no-fund --no-package-lock typescript@5.8.3 @types/node@22.15.32"
          echo "=== symlink node_modules into SDK dir so tsc typeRoots can resolve @types/node ==="
          docker exec aimarket-api sh -c "ln -sfn /tmp/cs8-deps/node_modules /tmp/verify-cs8/packages/moyu-skills-sdk/node_modules"
          echo "=== build SDK ==="
          docker exec aimarket-api sh -c "cd /tmp/verify-cs8/packages/moyu-skills-sdk && /tmp/cs8-deps/node_modules/.bin/tsc --listEmittedFiles"
          echo "=== verify dist files ==="
          docker exec aimarket-api ls /tmp/verify-cs8/packages/moyu-skills-sdk/dist/
          echo "=== run integration test ==="
          docker exec aimarket-api sh -c "cd /tmp/verify-cs8 && node scripts/test-moyu-sdk.mjs"

      - name: 19) D-S1 — verify commerce-promo-v1 Skill deployed + run integration test
        run: |
          set -e
          set -o pipefail
          echo "=== source YAML exists in latest main ==="
          ls -la /tmp/aimarket-verify-cs8/packages/agent-skills/skills/commerce-promo-v1.yaml
          echo "=== compiled skill in aimarket-api container (@aimarket/agent-skills dist) ==="
          docker exec aimarket-api ls -la /app/node_modules/@aimarket/agent-skills/dist/skills/commerce-promo-v1.yaml
          echo "=== GET /api/v1/agent/skills (informational, may 401 without auth) ==="
          CODE=$(curl -s -o /tmp/skills-resp.json -w "%{http_code}" "$API_BASE/api/v1/agent/skills" || echo "000")
          echo "GET -> $CODE"
          grep -q '"commerce-promo-v1"' /tmp/skills-resp.json && echo "commerce-promo-v1 in list ✓" || echo "(not in response — expected if 401)"
          echo "=== install yaml into isolated prefix (/tmp/ds1-deps) for test-commerce-skill.mjs ==="
          docker exec aimarket-api sh -c "rm -rf /tmp/ds1-deps && npm install --prefix /tmp/ds1-deps --no-audit --no-fund --no-package-lock yaml@2.8.0"
          docker exec aimarket-api sh -c "ln -sfn /tmp/ds1-deps/node_modules /tmp/verify-cs8/node_modules"
          echo "=== run test-commerce-skill.mjs via checkout ==="
          docker exec aimarket-api sh -c "cd /tmp/verify-cs8 && node scripts/test-commerce-skill.mjs"
