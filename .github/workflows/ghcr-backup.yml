# 将已存在于 TCR 的镜像复制到 GHCR（不重新 build）。按需 workflow_dispatch。
name: Mirror TCR images to GHCR (manual backup)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Git commit SHA (must already exist in TCR)
        required: true
      cleanup_ghcr:
        description: Prune GHCR to keep latest 15 versions per package after mirror
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ inputs.image_tag }}
  GHCR_OWNER: ${{ github.repository_owner }}
  TCR_REGISTRY: ${{ vars.TCR_REGISTRY || 'ccr.ccs.tencentyun.com' }}
  TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE || 'aimarket' }}

jobs:
  mirror:
    name: Mirror ${{ matrix.image }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        image: [aimarket-api, aimarket-web]
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Copy manifest TCR → GHCR
        run: |
          SRC="${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}"
          echo "Source: $SRC"
          docker buildx imagetools create \
            -t "ghcr.io/${{ env.GHCR_OWNER }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}" \
            -t "ghcr.io/${{ env.GHCR_OWNER }}/${{ matrix.image }}:latest" \
            "$SRC"

  cleanup-ghcr:
    name: Cleanup GHCR tags
    needs: mirror
    if: inputs.cleanup_ghcr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const keep = 15;
            const owner = context.repo.owner;
            const packages = ['aimarket-api', 'aimarket-web'];

            for (const pkg of packages) {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                {
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  per_page: 100,
                }
              );

              versions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const stale = versions.slice(keep);

              core.info(`${pkg}: total=${versions.length}, delete=${stale.length}`);
              for (const v of stale) {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  package_version_id: v.id,
                });
                core.info(`deleted ${pkg}@${v.name} (${v.id})`);
              }
            }
