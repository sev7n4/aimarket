name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @aimarket/agent-core build
      - run: pnpm --filter @aimarket/api build
      - run: pnpm --filter @aimarket/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4100

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: false
          tags: aimarket-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: false
          tags: aimarket-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://119.29.173.89:4100
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-summary:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, docker-build]
    if: always()
    steps:
      - run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint-typecheck | ${{ needs.lint-typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| docker-build | ${{ needs.docker-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
